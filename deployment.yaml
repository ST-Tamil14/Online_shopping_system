apiVersion: apps/v1
kind: Deployment
metadata:
  name: onlineshopping
spec:
  replicas: 2
  selector:
    matchLabels:
      app: onlineshopping
  template:
    metadata:
      labels:
        app: onlineshopping
    spec:
      containers:
      - name: onlineshopping
        image:23mis0203/online-shopping-system
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: onlineshopping
spec:
  type: NodePort
  selector:
    app: onlineshopping
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30007